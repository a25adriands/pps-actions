name: Lanzar test automaticamente

on:
  push:
  workflow_dispatch:
  issues:
    types: [opened, edited]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Ejecutar tests
        run: python -m pytest test_utils.py -v

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Crear executable
        run: pyinstaller --onefile main.py

      - name: Guardar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: executable
          path: dist/main
